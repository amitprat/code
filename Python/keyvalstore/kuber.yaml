# kv-store-statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kv
spec:
  serviceName: "raft"
  replicas: 3
  selector:
    matchLabels:
      app: kv
  template:
    metadata:
      labels:
        app: kv
    spec:
      containers:
      - name: kv
        image: kv-store:latest
        imagePullPolicy: IfNotPresent
        command: ["python3", "./main.py"]      # or whatever your binary is
        args: ["5000", "5001", "5002"]
        ports:
          - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: raft
spec:
  clusterIP: None  # headless service
  selector:
    app: kv
  ports:
  - port: 5000
    name: http